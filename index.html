document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

Y(-8px) scale(.98)}}\n  @keyframes frostPulse{0%,100%{opacity:.72}50%{opacity:.98}}\n  @keyframes hintBounce{0%,100%{transform:translateX(-50%)}50%{transform:translateX(-50%) translateY(7px)}}\n  @keyframes popIn{0%{transform:scale(0) rotate(-12deg);opacity:0}70%{transform:scale(1.18) rotate(4deg)}100%{transform:scale(1) rotate(0)}}\n  @keyframes veilPulse{0%,100%{opacity:.34}50%{opacity:.52}}\n  @keyframes smokeIn{0%{opacity:0;transform:scale(.92)}100%{opacity:1;transform:scale(1)}}\n  @keyframes smokeDrift{0%,100%{transform:translateX(-3px) scale(1.03)}50%{transform:translateX(3px) scale(1.06)}}\n  @keyframes comboPop{0%{transform:translateX(-50%) scale(.4);opacity:0}60%{transform:translateX(-50%) scale(1.15)}100%{transform:translateX(-50%) scale(1);opacity:1}}\n  @keyframes coreGlow{0%,100%{box-shadow:0 0 0 0 rgba(255,210,63,.0)}50%{box-shadow:0 0 18px 2px rgba(255,210,63,.55)}}\n  @keyframes ultReady{0%,100%{filter:brightness(1)}50%{filter:brightness(1.17)}}\n  @keyframes goldHue{0%{filter:hue-rotate(0deg) saturate(1.4)}100%{filter:hue-rotate(360deg) saturate(1.4)}}\n  @keyframes goldSweep{0%{transform:translateX(-160%) skewX(-18deg)}55%{transform:translateX(220%) skewX(-18deg)}100%{transform:translateX(220%) skewX(-18deg)}}\n  @keyframes goldGlow{0%,100%{box-shadow:inset 0 0 6px rgba(255,255,255,.85),0 0 6px rgba(255,220,80,.6)}50%{box-shadow:inset 0 0 9px rgba(255,255,255,.95),0 0 13px rgba(255,220,80,.95)}}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"min-height:100vh;width:100%;display:flex;align-items:center;justify-content:center;padding:20px;background:radial-gradient(120% 90% at 50% 0%, #e7e9f1, #c3c8d4)\">\n  <div style=\"width:402px;height:874px;border-radius:54px;background:linear-gradient(160deg,#1c1c22,#0c0c10);padding:11px;box-shadow:0 30px 70px rgba(30,20,50,.4),0 4px 14px rgba(0,0,0,.3),inset 0 0 0 2px rgba(255,255,255,.06)\">\n    <div ref=\"{{ setScreen }}\" style=\"position:relative;width:100%;height:100%;border-radius:44px;overflow:hidden;background:{{ screenBg }}\">\n\n      <!-- top star + level + timer strip (gameplay) -->\n      <sc-if value=\"{{ showTopBar }}\" hint-placeholder-val=\"{{ false }}\">\n        <div sc-camel-on-click=\"{{ onExitClick }}\" style=\"position:absolute;left:16px;top:18px;z-index:12;cursor:pointer;width:42px;height:42px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:linear-gradient(160deg,#ffffff,#f3ecff);border:1.5px solid rgba(128,71,224,.22);box-shadow:0 4px 11px rgba(90,63,214,.22),inset 0 1px 0 rgba(255,255,255,.9)\" style-active=\"transform:scale(.9)\">\n          <svg sc-camel-view-box=\"0 0 24 24\" width=\"21\" height=\"21\" fill=\"none\" stroke=\"#7d3fd6\" stroke-width=\"2.3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M14.5 3.5 h3 a2.5 2.5 0 0 1 2.5 2.5 v12 a2.5 2.5 0 0 1 -2.5 2.5 h-3\"><\u002Fpath><path d=\"M10 8 l-4 4 l4 4\"><\u002Fpath><path d=\"M6 12 h9\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n        <div style=\"position:absolute;left:0;right:0;top:22px;z-index:9;display:flex;align-items:center;justify-content:center;gap:9px;pointer-events:none\">\n          <div style=\"display:flex;align-items:center;gap:6px;padding:4px 12px;border-radius:13px;background:rgba(255,255,255,.9);box-shadow:0 2px 8px rgba(30,16,46,.14)\">\n            <span style=\"font-size:11px;font-weight:800;color:#8047e0\">Lv {{ level }}<\u002Fspan>\n            <div style=\"display:flex;gap:3px\">\n              <sc-for list=\"{{ starSlots }}\" as=\"st\" hint-placeholder-count=\"5\">\n                <div data-star=\"{{ st.i }}\" style=\"{{ st.style }}\"><\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- HUD + achievements: single card carries the background; children are transparent -->\n      <sc-if value=\"{{ showAch }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"position:absolute;left:12px;right:12px;top:70px;z-index:6;padding:9px 11px;border-radius:20px;background:{{ hudBg }};box-shadow:0 4px 14px rgba(20,12,40,.16),inset 0 1px 0 rgba(255,255,255,.5);display:flex;flex-direction:column;gap:9px\">\n        <!-- versus HUD row (transparent) -->\n        <div style=\"display:flex;align-items:center;gap:10px\">\n        <div style=\"flex:1;min-width:0;display:flex;flex-direction:column;gap:6px\">\n          <sc-if value=\"{{ showOppUI }}\" hint-placeholder-val=\"{{ true }}\"><div style=\"display:flex;align-items:center;gap:6px\">\n            <div style=\"width:22px;height:22px;border-radius:7px;flex:none;background:linear-gradient(150deg,#ff9a9a,#ff4d6d);box-shadow:inset 0 -2px 2px rgba(0,0,0,.2),inset 0 2px 2px rgba(255,255,255,.4);position:relative\">\n              <div style=\"position:absolute;left:26%;top:38%;width:3px;height:3px;border-radius:50%;background:#3a1024\"><\u002Fdiv>\n              <div style=\"position:absolute;left:62%;top:38%;width:3px;height:3px;border-radius:50%;background:#3a1024\"><\u002Fdiv>\n              <div style=\"position:absolute;left:38%;top:56%;width:24%;height:9%;border:1.4px solid #3a1024;border-top:none;border-radius:0 0 30px 30px\"><\u002Fdiv>\n            <\u002Fdiv>\n            <span style=\"font-size:10px;font-weight:600;color:{{ subInk }};width:30px;flex:none;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ opponentName }}<\u002Fspan>\n            <span style=\"font-size:8px;font-weight:800;color:#fff;background:#ff4d6d;border-radius:6px;padding:1px 4px;flex:none;white-space:nowrap;box-shadow:0 1px 2px rgba(255,77,109,.4)\">Lv {{ oppLevel }}<\u002Fspan>\n            <div style=\"display:flex;gap:3px;flex:1\">\n              <sc-for list=\"{{ oppSlots }}\" as=\"s\" hint-placeholder-count=\"7\">\n                <div style=\"{{ s.slotStyle }}\">\n                  <div style=\"{{ s.shapeStyle }}\"><\u002Fdiv>\n                  <sc-if value=\"{{ s.check }}\" hint-placeholder-val=\"{{ false }}\">\n                    <div \n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:402,&quot;height&quot;:874},&quot;opponentName&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;PixelPanda&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;startCoins&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:120,&quot;min&quot;:0,&quot;max&quot;:999,&quot;tsType&quot;:&quot;number&quot;},&quot;aiAggression&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;chill&quot;,&quot;normal&quot;,&quot;relentless&quot;],&quot;default&quot;:&quot;chill&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;juicy&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;}}\">\nclass Component extends DCLogic {\n  constructor(props){\n    super(props);\n    this.COLORS=[null,\n      {b:'#ff6b9d',l:'#ffd0e2',d:'#d63b73'},\n      {b:'#ff9f45',l:'#ffe2bb',d:'#e2761a'},\n      {b:'#ffd23f',l:'#fff3c0',d:'#e0a800'},\n      {b:'#5fd06a',l:'#cef3d0',d:'#2f9e3c'},\n      {b:'#36d6c4',l:'#c4f4ee',d:'#149b8c'},\n      {b:'#5b9dff',l:'#cfe2ff',d:'#2b6fe0'},\n      {b:'#b47bff',l:'#e6d4ff',d:'#8047e0'},\n      {b:'#ff5c8a',l:'#ffd0dd',d:'#e0356a'},\n      {b:'#ffce54',l:'#fff0c0',d:'#e0a000'}\n    ];\n    // Precomputed gradient strings — pure functions of tier, so build them ONCE here\n    // instead of re-concatenating for every cell on every render (the hot path).\n    this._candyGrad=this.COLORS.map(c=>c?`radial-gradient(circle at 35% 28%, ${c.l}, ${c.b} 58%, ${c.d})`:'');\n    this._rockGrad=this.COLORS.map((c,i)=>{const col=c||this.COLORS[1];return 'radial-gradient(circle at 36% 28%,'+col.l+' 4%,'+col.b+' 52%,'+col.d+' 100%)';});\n    // ---- 7 collectible \"treasures\" hidden under rocks; find all 7 to win ----\n    this.TREASURES=[null,\n      \"<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><path d='M6 34 L34 50 L34 50 L6 66 Z' fill='#ff9ec9'/><path d='M94 34 0' cy='42' r='16' fill='#ffb3d1'/><circle cx='60' cy='42' r='16' fill='#a0e6d0'/><circle cx='50' cy='34' r='16' fill='#fff0a0'/><\u002Fsvg>\",\n      \"<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><ellipse cx='50' cy='36' rx='30' ry='17' fill='#ffcf7a'/><ellipse cx='50' cy='64' rx='30' ry='17' fill='#ffcf7a'/><rect x='20' y='45' width='60' height='11' rx='5' fill='#ff9ec4'/><ellipse cx='50' cy='34' rx='24' ry='10' fill='#ffe0a8'/><\u002Fsvg>\"\n    ];\n    this.MYSTERY=\"<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><path d='M50 16 L84 42 L50 88 L16 42 Z' fill='#bcb6c8'/><path d='M50 16 L84 42 L50 50 Z' fill='#cbc6d6'/><path d='M50 16 L16 42 L50 50 Z' fill='#a9a3b8'/><path d='M50 50 L84 42 L50 88 Z' fill='#a29cb0'/><\u002Fsvg>\";\n    this._uri=s=>'url(\"data:image/svg+xml;utf8,'+encodeURIComponent(s)+'\")';\n    this.TREASURE_URI=this.TREASURES.map(s=>s?this._uri(s):null);\n    this.GOLD_GRAD='conic-gradient(from 0deg, #ff5d8f, #ff9f45, #ffe14d, #54cf6f, #3ac0e0, #8a6bff, #ff5d8f)';\n    this.MYSTERY_URI=this._uri(this.MYSTERY);\n    // 5-star progression bar art (gold 3D star vs grey empty)\n    this.STAR_GOLD=this._uri(\"<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path d='M12 1.6l3.1 6.3 6.9 1-5 4.9 1.2 6.9L12 17.9 5.8 20.6 7 13.8 2 8.9l6.9-1z' fill='#ffce3d' stroke='#e0980a' stroke-width='1.1'/><path d='M12 3.4l2.3 4.7 1.4.2-3.7 6z' fill='#fff3c0' opacity='.85'/><\u002Fsvg>\");\n    this.STAR_GRAY=this._uri(\"<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path d='M12 1.6l3.1 6.3 6.9 1-5 4.9 1.2 6.9L12 17.9 5.8 20.6 7 13.8 2 8.9l6.9-1z' fill='#c7c1d2' stroke='#a49db2' stroke-width='1'/><\u002Fsvg>\");\n    this._pFound=new Set(); this._oFound=new Set(); this._pOrder=[];\n    this.THEMES={\n      bubblegum:{screenBg:'linear-gradient(165deg,#ffe6f4 0%,#ece3ff 48%,#e2f1ff 100%)',hudBg:'rgba(255,255,255,.78)',barBg:'rgba(255,255,255,.82)',playerFrame:'linear-gradient(160deg,#fff4fb,#f3e6ff)',oppFrame:'rgba(255,255,255,.55)',ink:'#3a2740',sub:'#7a6088'},\n      tropical:{screenBg:'linear-gradient(165deg,#d6fff0 0%,#fdf3d6 60%,#ffe9d2 100%)',hudBg:'rgba(255,255,255,.8)',barBg:'rgba(255,255,255,.84)',playerFrame:'linear-gradient(160deg,#fffaf0,#e7fff4)',oppFrame:'rgba(255,255,255,.5)',ink:'#234a3e',sub:'#5e7a5e'},\n      galaxy:{screenBg:'linear-gradient(165deg,#231846 0%,#1a1330 55%,#2a1b4d 100%)',hudBg:'rgba(255,255,255,.12)',barBg:'rgba(30,20,55,.55)',playerFrame:'rgba(255,255,255,.08)',oppFrame:'rgba(255,255,255,.05)',ink:'#f3ecff',sub:'#b9a6e0'}\n    };\n    this.CORES={\n      aggressor:{label:'AGGRESSOR',color:'#ff4d6d',g:'linear-gradient(150deg,#ff9a9a,#ff4d6d)'},\n      builder:{label:'BUILDER',color:'#2ea24c',g:'linear-gradient(150deg,#8fe6a0,#2ea24c)'},\n      thief:{label:'THIEF',color:'#8047e0',g:'linear-gradient(150deg,#c6a0ff,#8047e0)'}\n    };\n    this.TMETA={\n      bomb:{name:'BOMB',color:'#ff5a3c'},\n      ice:{name:'FREEZE',color:'#3a9fe0'},\n      rock:{name:'JUNK',color:'#6d6f7a'},\n      smoke:{name:'SMOKE',color:'#a86bd6'},\n      shuffle:{name:'SHUFFLE',color:'#c44bd0'}\n    };\n    this.CHARGE_MAX=100;\n    this.ULTS={\n      aggressor:{name:'OVERLOAD',icon:'💥',sub:'Send 6 junk blocks',g:'linear-gradient(90deg,#ff5a3c,#ff2d6d)',emblem:'linear-gradient(150deg,#ff9a9a,#ff4d6d)',glow:'rgba(255,45,109,.6)'},\n      builder:{name:'EXCAVATE',icon:'⛏️',sub:'Lower 6 rocks 1 tier',g:'linear-gradient(90deg,#3fd06a,#1f9e8a)',emblem:'linear-gradient(150deg,#8fe6a0,#2ea24c)',glow:'rgba(45,162,76,.6)'},\n      thief:{name:'HEIST',icon:'🦝',sub:'Steal their best 3 candies',g:'linear-gradient(90deg,#b04bff,#7d2fd6)',emblem:'linear-gradient(150deg,#c6a0ff,#8047e0)',glow:'rgba(125,47,214,.6)'}\n    };\n    this._spots=this.pickTreasureSpots();\n    this.LEVEL_TIERS=[5,10,20,40,80,100];\n    this.ACH_POOL=[\n      {id:'merge',name:'Merger',icon:'🍬',goal:35,reward:12,desc:'Merge 35 candies'},\n      {id:'combo',name:'Combo Pro',icon:'⚡',goal:8,reward:25,desc:'Re
