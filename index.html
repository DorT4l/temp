document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

Y(-8px) scale(.98)}}\n  @keyframes frostPulse{0%,100%{opacity:.72}50%{opacity:.98}}\n  @keyframes hintBounce{0%,100%{transform:translateX(-50%)}50%{transform:translateX(-50%) translateY(7px)}}\n  @keyframes popIn{0%{transform:scale(0) rotate(-12deg);opacity:0}70%{transform:scale(1.18) rotate(4deg)}100%{transform:scale(1) rotate(0)}}\n  @keyframes veilPulse{0%,100%{opacity:.34}50%{opacity:.52}}\n  @keyframes smokeIn{0%{opacity:0;transform:scale(.92)}100%{opacity:1;transform:scale(1)}}\n  @keyframes smokeDrift{0%,100%{transform:translateX(-3px) scale(1.03)}50%{transform:translateX(3px) scale(1.06)}}\n  @keyframes comboPop{0%{transform:translateX(-50%) scale(.4);opacity:0}60%{transform:translateX(-50%) scale(1.15)}100%{transform:translateX(-50%) scale(1);opacity:1}}\n  @keyframes coreGlow{0%,100%{box-shadow:0 0 0 0 rgba(255,210,63,.0)}50%{box-shadow:0 0 18px 2px rgba(255,210,63,.55)}}\n  @keyframes ultReady{0%,100%{filter:brightness(1)}50%{filter:brightness(1.17)}}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"min-height:100vh;width:100%;display:flex;align-items:center;justify-content:center;padding:20px;background:radial-gradient(120% 90% at 50% 0%, #e7e9f1, #c3c8d4)\">\n  <div style=\"width:402px;height:874px;border-radius:54px;background:linear-gradient(160deg,#1c1c22,#0c0c10);padding:11px;box-shadow:0 30px 70px rgba(30,20,50,.4),0 4px 14px rgba(0,0,0,.3),inset 0 0 0 2px rgba(255,255,255,.06)\">\n    <div ref=\"{{ setScreen }}\" style=\"position:relative;width:100%;height:100%;border-radius:44px;overflow:hidden;background:{{ screenBg }}\">\n\n      <!-- versus HUD -->\n      <div style=\"position:relative;z-index:6;margin:10px 12px 8px;padding:9px 11px;border-radius:20px;background:{{ hudBg }};box-shadow:0 4px 14px rgba(20,12,40,.16),inset 0 1px 0 rgba(255,255,255,.5);display:flex;align-items:center;gap:10px\">\n        <div style=\"flex:1;min-width:0;display:flex;flex-direction:column;gap:6px\">\n          <div style=\"display:flex;align-items:center;gap:6px\">\n er('pointerup', e=>this.onBoardUp(e));\n      el.addEventListener('pointercancel', e=>this.onBoardUp(e));\n    }\n  };\n  setOppBoard=el=>{this.oBoardEl=el};\n  setGhost=el=>{this.ghostEl=el; if(el)el.style.display='none';};\n  setFx=el=>{this.fxEl=el};\n  setCoinEl=el=>{this.coinEl=el};\n  // Center combo readout: \"COMBO ×N\" + total coins earned since the combo started.\n  showComboCoins(total,combo){\n    if(!this.screenEl)return;\n    let el=this._comboCoinEl;\n    if(!el||!el.isConnected){\n      el=document.createElement('div');\n      el.style.cssText='position:absolute;left:50%;top:40%;transform:translate(-50%,-50%);z-index:58;pointer-events:none;display:flex;flex-direction:column;align-items:center;gap:2px;white-space:nowrap;will-change:transform';\n      this.screenEl.appendChild(el);\n      this._comboCoinEl=el;\n    }\n    el.innerHTML='<div style=\"font:700 18px Fredoka,sans-serif;color:#fff;letter-spacing:.5px;margin-bottom:5px;padding:5px 15px;border-radius:14px;background:linear-gradient(135deg,#ff8a3c,#ff5a8a);box-shadow:0 5px 14px rgba(255,90,120,.4)\">COMBO \\u00d7'+combo+'<\u002Fdiv><div style=\"width:76px;height:76px;border-radius:50%;background:radial-gradient(circle at 36% 30%,#fff2bf,#ffce3d 55%,#e09a00);box-shadow:inset 0 -3px 6px rgba(150,90,0,.5),inset 0 3px 5px rgba(255,255,255,.6),0 6px 16px rgba(0,0,0,.25);display:flex;align-items:center;justify-content:center;font:800 34px Fredoka,sans-serif;color:#8a5a00\">+'+total+'<\u002Fdiv>';\n    el.style.opacity='1';\n    // fast \"concussion\" shake that settles quickly\n    const jitter=[0,-9,8,-7,6,-5,4,-3,2,-1,0];\n    const kf=jitter.map((x,k)=>({transform:'translate(calc(-50% + '+x+'px), -50%) scale('+(k===0?1.4:1)+')',offset:k/(jitter.length-1)}));\n    try{el.animate(kf,{duration:320,easing:'ease-out'});}catch(e){}\n    clearTimeout(this._comboCoinT);\n    this._comboCoinT=setTimeout(()=>{\n      const el2=this._comboCoinEl; this._comboCoinEl=null;\n      if(el2){try{el2.animate([{opaci ed cell becomes empty\n    const freshIdx=new Set(fresh.map(c=>c.i));\n    const cleared=arr.map(cc=>freshIdx.has(cc.i)?{...cc,treasure:0,item:0,blocked:false}:cc);\n    if(who==='player'){this.setState({player:cleared,found:order.slice()});}\n    else{this.setState({opp:cleared,oppFound:foundSet.size});}\n    if(foundSet.size>=7 && !this.state.gameOver){\n      this.timers.push(setTimeout(()=>this.setState({gameOver:who==='player'?'win':'lose'}),780));\n    }\n  }\n  revealTreasure(boardEl,attr,i,id,who){\n    if(!this.fxEl||!boardEl)return;\n    const el=boardEl.querySelector('['+attr+'=\"'+i+'\"]');\n    if(!el)return;\n    const r=el.getBoundingClientRect(), fr=this.fxEl.getBoundingClientRect();\n    const cx=r.left-fr.left+r.width/2, cy=r.top-fr.top+r.height/2, ctr={x:cx,y:cy};\n    const size=Math.max(r.width*1.6,38);\n    const d=document.createElement('div');\n    const bg=this.TREASURE_URI[id];\n    const filt=who==='player'?'drop-shadow(0 4px 9px rgba(0,0,0,.38))':'brightness(0) opacity(.42) drop-shadow(0 2px 4px rgba(0,0,0,.25))';\n    d.style.cssText='position:absolute;left:'+cx+'px;top:'+cy+'px;width:'+size+'px;height:'+size+'px;transform:translate(-50%,-50%) scale(1);z-index:60;pointer-events:none;background-image:'+bg+';background-size:contain;background-repeat:no-repeat;background-position:center;filter:'+filt;\n    this.fxEl.appendChild(d);\n    // 0.1s still, then ~0.5s ACCELERATING vibrate (slow → faster → fastest);\n    // splash fires ~0.1s before the vibrate ends.\n    const VIB=600, still=100, sf=still/VIB;\n    const frames=[\n      {transform:'translate(-50%,-50%)',opacity:0,offset:0},\n      {transform:'translate(-50%,-50%)',opacity:1,offset:sf*0.5},\n      {transform:'translate(-50%,-50%)',opacity:1,offset:sf}\n    ];\n    const N=18; const cum=[]; let c=0,g=1;\n    for(let k=0;k<N;k++){cum.push(c); c+=g; g*=0.86;}   // intervals shrink → frequency ramps up\n    for(let k=0;k<N;k++){\n      const frac=cum[k]/c;\n      const off=Math.min(.9
