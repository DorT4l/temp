document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }

es frostPulse{0%,100%{opacity:.72}50%{opacity:.98}}\n  @keyframes hintBounce{0%,100%{transform:translateX(-50%)}50%{transform:translateX(-50%) translateY(7px)}}\n  @keyframes popIn{0%{transform:scale(0) rotate(-12deg);opacity:0}70%{transform:scale(1.18) rotate(4deg)}100%{transform:scale(1) rotate(0)}}\n  @keyframes veilPulse{0%,100%{opacity:.34}50%{opacity:.52}}\n  @keyframes smokeIn{0%{opacity:0;transform:scale(.92)}100%{opacity:1;transform:scale(1)}}\n  @keyframes smokeDrift{0%,100%{transform:translateX(-3px) scale(1.03)}50%{transform:translateX(3px) scale(1.06)}}\n  @keyframes comboPop{0%{transform:translateX(-50%) scale(.4);opacity:0}60%{transform:translateX(-50%) scale(1.15)}100%{transform:translateX(-50%) scale(1);opacity:1}}\n  @keyframes coreGlow{0%,100%{box-shadow:0 0 0 0 rgba(255,210,63,.0)}50%{box-shadow:0 0 18px 2px rgba(255,210,63,.55)}}\n  @keyframes ultReady{0%,100%{filter:brightness(1)}50%{filter:brightness(1.17)}}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"min-height:100vh;width:100%;display:flex;align-items:center;justify-content:center;padding:20px;background:radial-gradient(120% 90% at 50% 0%, #e7e9f1, #c3c8d4)\">\n  <div style=\"width:402px;height:874px;border-radius:54px;background:linear-gradient(160deg,#1c1c22,#0c0c10);padding:11px;box-shadow:0 30px 70px rgba(30,20,50,.4),0 4px 14px rgba(0,0,0,.3),inset 0 0 0 2px rgba(255,255,255,.06)\">\n    <div ref=\"{{ setScreen }}\" style=\"position:relative;width:100%;height:100%;border-radius:44px;overflow:hidden;background:{{ screenBg }}\">\n\n      <!-- versus HUD -->\n      <div style=\"position:relative;z-index:6;margin:10px 12px 8px;padding:9px 11px;border-radius:20px;background:{{ hudBg }};box-shadow:0 4px 14px rgba(20,12,40,.16),inset 0 1px 0 rgba(255,255,255,.5);display:flex;align-items:center;gap:10px\">\n        <div style=\"width:40px;height:40px;border-radius:13px;flex:none;background:linear-gradient(150deg,#ff8fc7,#a26bff);box-shadow:inset 0 -3px 4px rgba(0,0,0,.18),inset 0 3px 4px rgb Math.random()<0.65?1:2):0;}\n    const pairs=[[3*10+3,3*10+4],[5*10+5,5*10+6],[4*10+3,5*10+3],[3*10+6,4*10+6]];\n    pairs.forEach(([a,b])=>{cells[a].item=1;cells[b].item=1;cells[a].hidden=false;cells[b].hidden=false;});\n    cells[6*10+4].item=2;cells[6*10+4].hidden=false;cells[6*10+5].item=2;cells[6*10+5].hidden=false;\n    // hidden stones reveal EMPTY when uncovered (no candy underneath)\n    for(let i=0;i<100;i++){if(cells[i].hidden){cells[i].item=0;}}\n    if(!isPlayer){for(let r=2;r<=7;r++)for(let c=2;c<=7;c++){if(Math.random()<0.30){const i=r*10+c;cells[i].hidden=false;}}}\n    return cells;\n  }\n\n  pct(arr){let n=0;for(const c of arr)if(!c.hidden&&!c.blocked)n++;return n;}\n\n  // hex (#rrggbb) → rgba string with the given alpha, for soft class-colored halos\n  hexA(hex,a){\n    const h=(hex||'').replace('#','');\n    if(h.length<6)return 'rgba(0,0,0,'+a+')';\n    const r=parseInt(h.slice(0,2),16),g=parseInt(h.slice(2,4),16),b=parseInt(h.slice(4,6),16);\n    return 'rgba('+r+','+g+','+b+','+a+')';\n  }\n\n  // Can the PLAYER still make progress toward revealing their board?\n  playerCanProgress(){\n    const p=this.state.player, now=Date.now();\n    // frost is transient — never lock while cells are frozen; they'll thaw\n    if(p.some(c=>c.frostUntil>now && !c.hidden && !c.blocked)) return true;\n    // Builder EXCAVATE charged → can dig out fog & smash all junk\n    if(this.state.core==='builder' && this.state.charge>=this.CHARGE_MAX) return true;\n    const candy=i=>!p[i].hidden&&!p[i].blocked&&p[i].item>0;\n    const empty=i=>!p[i].hidden&&!p[i].blocked&&p[i].item===0;\n    // Builder's Wildcard passive re-arms on a timer (not on merges), so for a Builder\n    // any two touching candies are an eventual merge regardless of tier.\n    const wild=this.state.core==='builder';\n    for(let i=0;i<100;i++){\n      if(!candy(i))continue;\n      for(const nb of this.neigh8(i)){\n        if(nb<=i||!candy(nb))continue;\n        if(wild||p[i].item===p[nb].item)return true;\n      }\n    }\n    // could spawn toward a fresh pair? needs coins + at least 2 free cells\n    let empties=0; for(let i=0;i<100;i++) if(empty(i)) empties++;\n    if(this.state.coins>=20 && empties>=2) return true;\n    return false;\n  }\n  // Run a debounced check after moves/attacks that shrink the player's options.\n  scheduleLockCheck(){\n    clearTimeout(this._lockT);\n    this._lockT=setTimeout(()=>{\n      if(this.state.gameOver||this.state.screen!=='battle')return;\n      if(this.state.frozen){this.scheduleLockCheck();return;}\n      if(!this.playerCanProgress())this.setState({gameOver:'locked'});\n    },850);\n    this.timers.push(this._lockT);\n  }\n\n  // Size both boards so they fit the play area on ONE screen (no scrolling):\n  // player board as large as the width allows; the vertical gap between the two boards\n  // equals the player board's left/right margin; the opponent board grows to fill the rest.\n  layoutBoards(){\n    const sc=this.scrollEl, screen=this.screenEl;\n    if(!sc||!screen)return;\n    const H=sc.clientHeight, W=sc.clientWidth;\n    if(!H||!W)return;\n    const usableW=Math.min(W-16,368);\n    let pc=Math.floor((usableW-47)/10);        // player cell from available width\n    pc=Math.max(22,Math.min(31,pc));\n    const playerBoardW=10*pc+47+6;              // 10 cells + 9 gaps(3) + 2 pad(10) + 2 border(3)\n    const gap=Math.max(8,Math.round((W-playerBoardW)/2)); // = board's side margin = gap to opp board = gap to ultimate bar\n    const playerSectionH=10*pc+47+gap+6;        // board + bottom pad(=gap) + border (2×3px)\n    const oppChrome=29;                         // opp label + tightened section paddings + 5px border\n    const avail=H-playerSectionH-gap-oppChrome; // room left for the opponent board\n    let oc=Math.floor((avail-36)/10);           // 36 = board pad(18) + gaps(18)\n    oc=Math.max(11,Math.min(pc-1,oc));          // a touch smaller than the player cell\n    screen.style.setProperty('--pc',pc+'px');\n    screen.style.setProperty('--oc',oc+'px');\n    screen.style.setProperty('--gap',gap+'px');\n  }\n\n  snapToPlayer(){\n    const sc=this.scrollEl, pb=this.pBoardEl;\n    if(!sc||!pb)return;\n    const delta=pb.getBoundingClientRect().top - sc.getBoundingClientRect().top;\n    sc.scrollTop=Math.max(0, sc.scrollTop + delta - 92);\n    this.restScroll=sc.scrollTop;\n  }\n  // setInterval-based smooth scroll — native behavior:'smooth' is a no-op in this runtime\n  animScroll(targetTop, dur){\n    const sc=this.scrollEl; if(!sc)return;\n    dur=dur||520;\n    const start=sc.scrollTop, max=sc.scrollHeight-sc.clientHeight;\n    const dest=Math.max(0,Math.min(max,targetTop));\n    clearInterval(this._scrollIv);\n    if(Math.abs(dest-start)<2){sc.scrollTop=dest;return;}\n    const t0=Date.now();\n    const ease=p=>p<0.5?2*p*p:1-Math.pow(-2*p+2,2)/2;\n    this._scrollIv=setInterval(()=>{\n      const p=Math.min(1,(Date.now()-t0)/dur);\n      sc.scrollTop=start+(dest-start)*ease(p);\n      if(p>=1)clearInterval(this._scrollIv);\n    },16);\n    this.timers.push(this._scrollIv);\n  }\n  scrollToPlayer(smooth){\n    const sc=this.scrollEl,pb=this.pBoardEl;if(!sc||!pb)return;\n    const d=pb.getBoundingClientRect().top-sc.getBoundingClientRect().top;\n    const dest=Math.max(0,sc.scrollTop+d-92);\n    if(smooth)this.animScroll(dest); else sc.scrollTop=dest;\n  }\n  scrollToOpp(){ this.animScroll(0); }\n\n  /* ---------- lifecycle ---------- */\n  componentDidMount(){\n    requestAnimationFrame(()=>{this.layoutBoards();this.snapToPlayer();});\n    this.applyViewport();\n    this._vp=()=>this.applyViewport();\n    window.addEventListener('resize',this._vp);\n    window.addEventListener('orientationchange',this._vp);\n  }\n  // On a phone: drop the desktop \"phone mockup\" bezel and let the game fill the whole\n  // viewport (no page scrolling — the in-game swipe-to-spy scroll still works).\n  applyViewport(){\n    const screen=this.screenEl; if(!screen)return;\n    const shell \"><\u002Fdiv><div style=\"position:absolute;left:52%;top:42%;width:17px;height:17px;border-radius:50%;background:#e3d6f0\"><\u002Fdiv>';\n    } else if(type==='shuffle'){\n      p.style.cssText='position:absolute;left:0;top:0;width:32px;height:32px;border-radius:50%;background:conic-gradient(from 0deg,#ff6b9d,#ffd23f,#5fd06a,#5b9dff,#b47bff,#ff6b9d);box-shadow:0 0 14px rgba(180,120,255,.6),inset 0 0 0 4px rgba(255,255,255,.8);transform:translate(-50%,-50%)';\n    } else {\n      p.style.cssText='position:absolute;left:0;top:0;width:38px;height:34px;border-radius:13px 15px 11px 14px;background:radial-gradient(circle at 38% 30%,#aab0bb,#5d636f 65%,#3c414b);box-shadow:0 4px 10px rgba(0,0,0,.4),inset 0 2px 3px rgba(255,255,255,.3);transform:translate(-50%,-50%)';\n    }\n    return p;\n  }\n  launch(from,to,type,onImpact){\n    const DUR=1080;\n    this.timers.push(setTimeout(onImpact,DUR));\n    if(!this.fxEl)return;\n    const p=this.makeProjectile(type);\n    p.style.left=from.x+'px'; p.style.top=from.y+'px';\n    this.fxEl.appendChild(p);\n    const dx=to.x-from.x, dy=to.y-from.y;\n    const arcH=Math.min(210,Math.abs(dx)*0.35+150);\n    const spin=type==='shuffle'?1080:type==='ice'?360:type==='smoke'?20:720;\n    const T='translate(-50%,-50%) ';\n    p.animate([\n      {transform:T+'translate(0px,0px) rotate(0deg)',offset:0},\n      {transform:T+'translate('+(dx*0.5)+'px,'+(dy*0.5-arcH)+'px) rotate('+(spin/2)+'deg)',offset:0.5},\n      {transform:T+'translate('+dx+'px,'+dy+'px) rotate('+spin+'deg)',offset:1}\n    ],{duration:DUR,easing:'cubic-bezier(.4,.02,.6,.98)'});\n    this.timers.push(setTimeout(()=>{if(p.parentNode)p.remove();},DUR+30));\n    const tc=type==='bomb'?'rgba(255,150,60,.6)':type==='ice'?'rgba(150,210,255,.6)':type==='smoke'?'rgba(235,220,250,.7)':type==='shuffle'?'rgba(200,150,255,.6)':'rgba(150,150,160,.5)';\n    let trailT=setInterval(()=>{\n      const r=p.getBoundingClientRect(),sr=this.screenEl.getBoundingClientRect();\n      const tr=document.createElement('div');\n      tr.style.cssText='position:absolute;left:'+(r.left+r.width/2-sr.left)+'px;top:'+(r.top+r.height/2-sr.top)+'px;width:8px;height:8px;border-radius:50%;background:'+tc+';transform:translate(-50%,-50%)';\n      this.fxEl.appendChild(tr);\n      tr.animate([{opacity:.7,transform:'translate(-50%,-50%) scale(1)'},{opacity:0,transform:'translate(-50%,-50%) scale(.3)'}],{duration:420,fill:'forwards'});\n      setTimeout(()=>{if(tr.parentNode)tr.remove();},460);\n    },55);\n    this.timers.push(setTimeout(()=>clearInterval(trailT),1100));\n  }\n  explodeFx(c,type){\n    this.shake();\n    if(type==='bomb'){\n      const ring=document.createElement('div');\n      ring.style.cssText='position:absolute;left:'+c.x+'px;top:'+c.y+'px;width:20px;height:20px;border-radius:50%;border:4px solid #ffb13a;transform:translate(-50%,-50%)';\n      this.fxEl.appendChild(ring);\n      ring.animate([{width:'20px',height:'20px',opacity:1,borderWidth:'5px'},{width:'190px',height:'190px',opacity:0,borderWidth:'1px'}],{duration:560,easing:'cubic-bezier(.2,.8,.3,1)',fill:'forwards'});\n      setTimeout(()=>{if(ring.parentNode)ring.remove();},620);\n      this.burst(c,'#ff8a2a',16); this.burst(c,'#ffd23f',10);\n    } else if(type==='ice'){ this.burst(c,'#9fd6ff',14); this.burst(c,'#ffffff',8); }\n    else if(type==='smoke'){ this.burst(c,'#efe2fb',14); this.burst(c,'#ffffff',8); }\n    else if(type==='shuffle'){ this.burst(c,'#b47bff',12); this.burst(c,'#ffd23f',8); }\n    else { this.burst(c,'#8a8f9a',12); }\n  }\n\n  /* ---------- fast junk drops (no freeze) ---------- */\n  flyRock(from,to,onDone){\n    if(!this.fxEl){onDone&&onDone();return;}\n    const p=document.createElement('div');\n    p.style.cssText='position:absolute;left:'+from.x+'px;top:'+from.y+'px;width:22px;height:22px;filter:drop-shadow(0 3px 5px rgba(0,0,0,.35));transform:translate(-50%,-50%)';\n    p.innerHTML='<svg viewBox=\"0 0 100 100\" width=\"100%\" height=\"100%\" style=\"display:block\"><path d=\"M20 30 40 13 63 11 85 26 89 53 77 81 51 91 23 83 9 55Z\" fill=\"#ece2cf\" stroke=\"#bdb096\" stroke-width=\"3\" stroke-linejoin=\"round\"/><path d=\"M40 13 63 11 70 41 46 45Z\" fill=\"#f8f2e5\"/><path d=\"M20 30 40 13 46 45 23 50Z\" fill=\"#f1e9d8\"/><path d=\"M46 45 70 41 77 81 51 91Z\" fill=\"#ddd0b6\"/><path d=\"M23 83 51 91 46 45 9 55Z\" fill=\"#e3d8c1\"/><path d=\"M70 41 85 26 89 53 77 81Z\" fill=\"#d6c8ab\"/><g stroke=\"#bfb197\" stroke-width=\"1.6\" fill=\"none\" stroke-linecap=\"round\"><path d=\"M46 45 40 13M46 45 70 41M46 45 23 83M46 45 9 55M46 45 77 81M70 41 85 26\"/><\u002Fg><\u002Fsvg>';\n    this.fxEl.appendChild(p);\n    const dx=to.x-from.x, dy=to.y-from.y;\n    const arcH=Math.min(130,Math.abs(dx)*0.25+70);\n    p.animate([\n      {transform:'translate(-50%,-50%) translate(0,0) rotate(0deg)'},\n      {transform:'translate(-50%,-50%) translate('+(dx*0.5)+'px,'+(dy*0.5-arcH)+'px) rotate(180deg)',offset:.5},\n      {transform:'translate(-50%,-50%) translate('+dx+'px,'+dy+'px) rotate(360deg)'}\n    ],{duration:560,easing:'cubic-bezier(.4,.1,.6,1)'});\n    setTimeout(()=>{if(p.parentNode)p.remove();onDone&&onDone();},560);\n  }\n  junkDrop(targetKey,n){\n    if(this.state.gameOver||n<=0)return;\n    const outgoing=targetKey==='opp';\n    // warn the player when junk is incoming at them\n    if(!outgoing)this.banner('⚠ INCOMING JUNK!', '#e23b5a');\n    const srcBoardEl=outgoing?this.pBoardEl:this.oBoardEl;\n    const srcAttr=outgoing?'data-i':'data-oi';\n    const tgtBoardEl=outgoing?this.oBoardEl:this.pBoardEl;\n    const tgtAttr=outgoing?'data-oi':'data-i';\n    const arr=this.state[targetKey];\n    const cand=arr.map((c,i)=>i).filter(i=>!arr[i].hidden&&!arr[i].blocked&&arr[i].item===0);\n    if(!cand.length)return;\n    const targets=[];\n    for(let k=0;k<n&&cand.length;k++){const j=Math.floor(Math.random()*cand.length);targets.push(cand[j]);cand.splice(j,1);}\n    const srcArr=this.state[outgoing?'player':'opp'];\n    const srcRev=srcArr.map((c,i)=>i).filter(i=>!srcArr[i].hidden);\n    targets.forEach((ti,k)=>{\n      this.timers.push(setTimeout(()=>{\n        const si=srcRev.length?srcRev[Math.floor(Math.random()*srcRev.length)]:44;\n        const from=this.centerOf(srcBoardEl,srcAttr,si);\n        const to=this.centerOf(tgtBoardEl,tgtAttr,ti);\n        this.flyRock(from,to,()=>this.applyJunk(targetKey,ti));\n      },k*110));\n    });\n  }\n  applyJunk(targetKey,ti){\n    const arr=this.state[targetKey].map(c=>({...c}));\n    if(arr[ti].hidden||arr[ti].blocked||arr[ti].item>0)return;\n    arr[ti].blocked=true; arr[ti].item=0;\n    this.setState({[targetKey]:arr});\n    if(targetKey==='player')this.scheduleLockCheck();\n    const boardEl=targetKey==='opp'?this.oBoardEl:this.pBoardEl;\n    const attr=targetKey==='opp'?'data-oi':'data-i';\n    this.burst(this.centerOf(boardEl,attr,ti),'#8a8f9a',6);\n  }\n\n  /* ---------- cinematic sabotage (freeze both) ---------- */\n  sendCinematic(type,dir){\n    if(this.state.frozen||this.state.gameOver)return;\n    const outgoing=dir==='out';\n    this.setState({frozen:true,showHint:false});\n    this.scrollToOpp();\n    const meta=this.TMETA[type];\n    if(outgoing){\n      const verb={bomb:'BOMB AWAY!',ice:'FREEZE SENT!',rock:'JUNK STRIKE!',smoke:'SMOKE BOMB!',shuffle:'SHUFFLE!'};\n      this.banner(verb[type], meta.color);\n    } else {\n      this.banner('⚠ INCOMING '+meta.name+'!', '#e23b5a');\n    }\n    const srcKey=outgoing?'player':'opp', tgtKey=outgoing?'opp':'player';\n    const srcBoardEl=outgoing?this.pBoardEl:this.oBoardEl;\n    const srcAttr=outgoing?'data-i':'data-oi';\n    const tgtBoardEl=outgoing?this.oBoardEl:this.pBoardEl;\n    const tgtAttr=outgoing?'data-oi':'data-i';\n    const fromI=this.pickRevealed(this.state[srcKey]);\n    const toI=this.pickRevealed(this.state[tgtKey]);\n    const fire=()=>{\n      // capture coords only AFTER the view has settled on the right board, so the\n      // projectile starts/lands on the actual on-screen cells (not an off-screen guess)\n      const from=this.centerOf(srcBoardEl,srcAttr,fromI);\n      const to=this.centerOf(tgtBoardEl,tgtAttr,toI);\n      this.launch(from,to,type,()=>{\n        const to2=this.centerOf(tgtBoardEl,tgtAttr,toI);\n        this.explodeFx(to2,type);\n        this.applyDamage(tgtKey,toI,type);\n        this.timers.push(setTimeout(()=>this.setState({frozen:false}),700));\n        if(outgoing)this.timers.push(setTimeout(()=>this.scrollToPlayer(true),900));\n      });\n    };\n    if(outgoing){\n      // already panned to opponent — fire once it's settled\n      this.timers.push(setTimeout(fire,560));\n    } else {\n      // incoming: show it originate on the opponent's board, pan down to OUR board,\n      // then fire so the target cell is on-screen and the hit lands where intended\n      this.timers.push(setTimeout(()=>this.scrollToPlayer(true),700));\n      this.timers.push(setTimeout(fire,1320));\n    }\n  }\n\n  applyDamage(targetKey,center,type){\n    const arr=this.state[targetKey].map(c=>({...c}));\n    if(type==='bomb'){\n      [center,...this.neigh8(center)].forEach(i=>{arr[i].hidden=true;arr[i].item=0;arr[i].blocked=false;arr[i].frostUntil=0;});\n      this.setState({[targetKey]:arr});\n      if(targetKey==='player')this.scheduleLockCheck();\n    } else if(type==='ice'){\n      const until=Date.now()+6000;\n      [center,...this.neigh8(center)].forEach(i=>{if(!arr[i].hidden&&!arr[i].blocked)arr[i].frostUntil=until;});\n      this.setState({[targetKey]:arr});\n      this.timers.push(setTimeout(()=>{const a=this.state[targetKey].map(c=>({...c}));a.forEach(c=>{if(c.frostUntil<=Date.now())c.frostUntil=0;});this.setState({[targetKey]:a});},6200));\n    } else if(type==='rock'){\n      [center,this.neigh8(center)[0]].forEach(i=>{if(i!=null&&!arr[i].hidden){arr[i].blocked=true;arr[i].item=0;}});\n      this.setState({[targetKey]:arr});\n      if(targetKey==='player')this.scheduleLockCheck();\n    } else if(type==='smoke'){\n      const until=Date.now()+4200;\n      this.setState({[targetKey==='player'?'playerSmoke':'oppSmoke']:until});\n      this.timers.push(setTimeout(()=>{const key=targetKey==='player'?'playerSmoke':'oppSmoke';if(this.state[key]<=Date.now())this.setState({[key]:0});},4350));\n    } else if(type==='shuffle'){\n      const idx=arr.map((c,i)=>i).filter(i=>!arr[i].hidden&&!arr[i].blocked&&arr[i].item>0);\n      const items=idx.map(i=>arr[i].item);\n      for(let i=items.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[items[i],items[j]]=[items[j],items[i]];}\n      idx.forEach((i,k)=>arr[i].item=items[k]);\n      this.setState({[targetKey]:arr});\n    }\n  }\n\n  banner(text,color){\n    this.setState({bannerText:text,bannerColor:color});\n    clearTimeout(this._bannerT);\n    this._bannerT=setTimeout(()=>this.setState({bannerText:null}),2000);\n    this.timers.push(this._bannerT);\n  }\n  denyCoins(){this.banner('Not enough coins!','#c0392b');}\n\n  /* ---------- opponent AI ---------- */\n  oppFindPair(){\n    const o=this.state.opp, cand=[];\n    for(let i=0;i<100;i++){\n      if(o[i].hidden||o[i].blocked||o[i].item<=0)continue;\n      for(const n of this.neigh8(i)){\n        if(n>i&&!o[n].hidden&&!o[n].blocked&&o[n].item===o[i].item)cand.push([i,n]);\n      }\n    }\n    return cand.length?cand[Math.floor(Math.random()*cand.length)]:null;\n  }\n  oppTick(){\n    if(this.state.frozen||this.state.gameOver||this.state.screen!=='battle')return;\n    const pair=this.oppFindPair();\n    if(pair)this.oppAnimatedMerge(pair[0],pair[1]);\n    else this.oppProgress();\n  }\n  oppAnimatedMerge(from,to){\n    if(this.state.frozen||this.state.gameOver)return;\n    const level=this.state.opp[to].item;\n    const fromC=this.centerOf(this.oBoardEl,'data-oi',from);\n    const toC=this.centerOf(this.oBoardEl,'data-oi',to);\n    const opp=this.state.opp.map(c=>({...c}));\n    opp[from].item=0;            // lift the source candy; clone flies to target\n    this.setState({opp});\n    this.flyCandyMove(fromC,toC,level,22,240,()=>{\n      if(this.state.gameOver)return;\n      const o=this.state.opp.map(c=>({...c}));\n      if(o[to].hidden||o[to].blocked||o[to].item<=0)return; // got bombed mid-flight\n      o[to].item=Math.min(9,level+1);\n      const newLevel=o[to].item;\n      this.neigh8(to).forEach(n=>{ if(o[n].hidden){o[n].hidden=false;} else if(o[n].blocked){o[n].blocked=false;o[n].item=0;} });\n      // opponent earns coins on merges, just like the player\n      const gain=2+(newLevel>=4?newLevel-2:0)+(this.state.oppCore==='thief'?1:0);\n      this.setState({opp:o, oppCoins:this.state.oppCoins+gain});\n      this.mergeFx(fromC,toC,o[to].item);\n      this.oppPop(to);\n      // AGGRESSOR passive: a merge into a Tier 4 lobs 1 free junk at the player\n      if(this.state.oppCore==='aggressor' && newLevel===4 && !this.state.frozen){ this.junkDrop('player',1); }\n      if(this.pct(o)>=100)this.timers.push(setTimeout(()=>this.setState({gameOver:'lose'}),300));\n    });\n  }\n  oppProgress(){\n    const opp=this.state.opp.map(c=>({...c}));\n    const hidden=opp.map((c,i)=>i).filter(i=>opp[i].hidden);\n    if(!hidden.length&&!opp.some(c=>c.blocked)){this.setState({gameOver:'lose'});return;}\n    const n=1+Math.floor(Math.random()*2);\n    for(let k=0;k<n&&hidden.length;k++){const j=Math.floor(Math.random()*hidden.length);opp[hidden[j]].hidden=false;hidden.splice(j,1);}\n    const blocks=opp.map((c,i)=>i).filter(i=>opp[i].blocked);\n    if(blocks.length&&Math.random()<0.6){const b=blocks[Math.floor(Math.random()*blocks.length)];opp[b].blocked=false;opp[b].item=0;}\n    // seed candies so new mergeable pairs keep appearing\n    const empties=opp.map((c,i)=>i).filter(i=>!opp[i].hidden&&!opp[i].blocked&&opp[i].item===0);\n    for(let k=0;k<2&&empties.length;k++){const j=Math.floor(Math.random()*empties.length);opp[empties[j]].item=1;empties.splice(j,1);}\n    this.setState({opp});\n    if(this.pct(opp)>=100)this.timers.push(setTimeout(()=>this.setState({gameOver:'lose'}),300));\n  }\n  oppAttack(){\n    if(this.state.frozen||this.state.gameOver||this.state.screen!=='battle')return;\n    // opponent pays for its attacks out of its own coin balance (earned by merging),\n    // so it can only attack as often as its economy allows — just like a real player.\n    const costs={ice:35,smoke:40,bomb:50};\n    const opts=[];\n    for(const k in costs) if(this.state.oppCoins>=costs[k]) opts.push(k);\n    if(this.state.oppCore==='aggressor' && this.state.oppCoins>=30) opts.push('junk');\n    if(!opts.length) return;               // can't afford anything yet — keep saving\n    if(Math.random()<0.4) return;          // sometimes hold coins instead of spending\n    const pick=opts[Math.floor(Math.random()*opts.length)];\n    if(pick==='junk'){\n      this.setState({oppCoins:this.state.oppCoins-30});\n      this.junkDrop('player', 1+Math.floor(Math.random()*2));\n    } else {\n      this.setState({oppCoins:this.state.oppCoins-costs[pick]});\n      this.sendCinematic(pick,'in');\n    }\n  }\n\n  /* ---------- actions ---------- */\n  onGenerate(){\n    if(this.state.screen!=='battle'||this.state.frozen||this.state.gameOver)return;\n    if(this.state.coins<20){this.denyCoins();return;}\n    const player=this.state.player.map(c=>({...c}));\n    const empty=player.map((c,i)=>i).filter(i=>!player[i].hidden&&player[i].item===0&&!player[i].blocked&&player[i].frostUntil<=Date.now());\n    if(!empty.length){this.banner('No empty space!','#c0392b');return;}\n    const drops=[];\n    for(let k=0;k<3&&empty.length;k++){const j=Math.floor(Math.random()*empty.length);const idx=empty[j];player[idx].item=1;drops.push(idx);empty.splice(j,1);}\n    this.setState({player,coins:this.state.coins-20,showHint:false});\n    drops.forEach(idx=>{this.requestPop(idx);const c=this.centerOf(this.pBoardEl,'data-i',idx);this.timers.push(setTimeout(()=>this.burst(c,'#54cf6f',6),30));});\n  }\n  attackManual(type,cost){\n    if(this.state.screen!=='battle'||this.state.frozen||this.state.gameOver)return;\n    if(this.state.coins<cost){this.denyCoins();return;}\n    this.setState({coins:this.state.coins-cost});\n    this.sendCinematic(type,'out');\n  }\n  incoming(type){this.sendCinematic(type,'in');}\n  onBomb(){this.attackManual('bomb',50);}\n  onIce(){this.attackManual('ice',35);}\n  onRock(){this.attackManual('rock',25);}\n  onSmoke(){this.attackManual('smoke',40);}\n  onShuffle(){this.attackManual('shuffle',30);}\n  onJunk(){\n    const COST=30;\n    if(this.state.screen!=='battle'||this.state.frozen||this.state.gameOver)return;\n    if(this.state.coins<COST){this.denyCoins();return;}\n    this.setState({coins:this.state.coins-COST,showHint:false});\n    // sweep over to the rival's board to watch the junk land, then return\n    this.scrollToOpp();\n    this.timers.push(setTimeout(()=>this.junkDrop('opp',3),480));\n    this.timers.push(setTimeout(()=>this.scrollToPlayer(true),1700));\n  }\n  onScroll(e){if(this.state.showHint&&this.restScroll!=null&&e.target.scrollTop<this.restScroll-26)this.setState({showHint:false});}\n\n  onPickAgg(){this.setState({selCore:'aggressor'});}\n  onPickBuild(){this.setState({selCore:'builder'});}\n  onPickThief(){this.setState({selCore:'thief'});}\n  onStartBattle(){this.startBattle();}\n\n  onRestart(){\n    this.timers.forEach(clearTimeout);this.timers=[];clearInterval(this.oppTimer);clearInterval(this.oppAtkTimer);clearInterval(this._wildCountIv);this._wildArmAt=0;\n    this.lastMergeAt=0;this.oppAtkCount=0;\n    this.setState({screen:'loadout',core:null,oppCore:null,player:this.seed(true),opp:this.seed(false),coins:this.props.startCoins??120,oppCoins:this.props.startCoins??120,gameOver:null,frozen:false,bannerText:null,showHint:true,combo:0,playerSmoke:0,oppSmoke:0,wildcardReady:false,charge:0},()=>{\n      requestAnimationFrame(()=>this.snapToPlayer());\n    });\n  }\n\n  /* ---------- view ---------- */\n  buildView(arr,interactive){\n    const dragFrom=this.drag?this.drag.fromI:-1;\n    const hover=this.state.hoverIndex, hv=this.state.hoverValid;\n    const now=Date.now();\n    return arr.map(c=>{\n      const candy=!c.hidden&&c.item>0&&!c.blocked;\n      let outline='none',tf='none',opacity='1';\n      if(candy&&interactive){\n        if(c.i===dragFrom){opacity='0.3';tf='scale(.88)';}\n        else if(c.i===hover&&hv){outline='3px solid #fff';tf='scale(1.14)';}\n      }\n      return {i:c.i,stone:c.hidden,candy,blocked:c.blocked&&!c.hidden,frost:c.frostUntil>now,level:c.item,grad:candy?this.grad(c.item):'',outline,opacity,tf};\n    });\n  }\n  selStyle(key){\n    const sel=this.state.selCore===key;\n    const col=this.CORES[key].color;\n    return {\n      border: sel? '3px solid '+col : '3px solid rgba(0,0,0,0)',\n      shadow: sel? '0 10px 26px rgba(0,0,0,.32)' : '0 4px 12px rgba(0,0,0,.16)',\n      scale: sel? 'scale(1.025)' : 'scale(1)'\n    };\n  }\n\n  renderVals(){\n    const t=this.THEMES[this.state.theme]||this.THEMES.bubblegum;\n    const over=this.state.gameOver;\n    const combo=this.state.combo;\n    const {m,underdog}=this.junkMul(combo);\n    const core=this.state.core;\n    const ultM=core?this.ULTS[core]:null;\n    const ultReady=this.state.charge>=this.CHARGE_MAX;\n    const wildRemain=(this.state.core==='builder'&&!this.state.wildcardReady&&this.state.screen==='battle'&&this._wildArmAt)?(this._wildArmAt-Date.now()):-1;\n    const chargePct=Math.round(this.state.charge/this.CHARGE_MAX*100);\n    const ag=this.selStyle('aggressor'), bu=this.selStyle('builder'), th=this.selStyle('thief');\n    const pp=this.pct(this.state.player), op=this.pct(this.state.opp);\n    return {\n      screenBg:t.screenBg, hudBg:t.hudBg, barBg:t.barBg,\n      playerFrame:t.playerFrame, oppFrame:t.oppFrame,\n      inkColor:t.ink, subInk:t.sub,\n      coins:this.state.coins,\n      opponentName:this.props.opponentName||'PixelPanda',\n      playerPct:pp, oppPct:op, playerPctW:pp+'%', oppPctW:op+'%',\n      playerView:this.buildView(this.state.player,true),\n      oppView:this.buildView(this.state.opp,false),\n      frozen:this.state.frozen,\n      bannerText:this.state.bannerText, bannerColor:this.state.bannerColor,\n      showHint:this.state.showHint&&this.state.screen==='battle',\n      playerSmoke:this.state.playerSmoke>Date.now(),\n      oppSmoke:this.state.oppSmoke>Date.now(),\n      comboShow:combo>=2&&this.state.screen==='battle',\n      comboMul:combo, comboLabel:underdog?'UNDERDOG':'COMBO',\n      comboColor:underdog?'linear-gradient(135deg,#b04bff,#7d2fd6)':'linear-gradient(135deg,#ff8a3c,#ff5a8a)',\n      coreBadge:!!core&&this.state.screen==='battle',\n      coreLabel:core?this.CORES[core].label:'', coreColor:core?this.CORES[core].color:'#7d5cff', coreG:core?this.CORES[core].g:'',\n      playerBorderColor:core?this.CORES[core].color:'transparent',\n      playerBorderHalo:core?this.hexA(this.CORES[core].color,.18):'transparent',\n      oppBorderColor:this.state.oppCore?this.CORES[this.state.oppCore].color:'transparent',\n      oppBorderHalo:this.state.oppCore?this.hexA(this.CORES[this.state.oppCore].color,.16):'transparent',\n      wildShow:this.state.core==='builder'&&this.state.wildcardReady&&this.state.screen==='battle',\n      wildCountShow:wildRemain>0&&wildRemain<=5000,\n      wildCountSecs:Math.max(1,Math.ceil(wildRemain/1000)),\n      showUlt:!!core&&this.state.screen==='battle',\n      ultName:ultM?ultM.name:'', ultIcon:ultM?ultM.icon:'',\n      ultSub:ultM?(ultReady?'Charged — tap to unleash!':ultM.sub):'',\n      ultStatus:ultReady?'TAP!':chargePct+'%',\n      ultFillW:(ultReady?100:chargePct)+'%',\n      ultFill:ultM?ultM.g:'#888',\n      ultEmblem:ultM?ultM.emblem:'',\n      ultShadow:ultReady?('0 0 20px 3px '+(ultM?ultM.glow:'rgba(255,255,255,.5)')):'0 4px 12px rgba(20,12,40,.22)',\n      ultAnim:ultReady?'ultReady 1.4s ease-in-out infinite':'none',\n      showLoadout:this.state.screen==='loadout',\n      aggBorder:ag.border, aggShadow:ag.shadow, aggScale:ag.scale,\n      buildBorder:bu.border, buildShadow:bu.shadow, buildScale:bu.scale,\n      thiefBorder:th.border, thiefShadow:th.shadow, thiefScale:th.scale,\n      gameOver:over,\n      overTitle:over==='win'?'YOU WIN!':(over==='locked'?'BOARD LOCKED!':'YOU LOSE'),\n      overSub:over==='win'?'Board fully revealed 🎉':(over==='locked'?'No moves left — you lost':'Rival revealed first'),\n      overColor:over==='win'?'#23b14f':'#e23b5a',\n      onBoardDown:e=>this.onBoardDown(e),\n      onBoardMove:e=>this.onBoardMove(e),\n      onBoardUp:e=>this.onBoardUp(e),\n      onGenerate:()=>this.onGenerate(),\n      onBomb:()=>this.onBomb(), onIce:()=>this.onIce(), onRock:()=>this.onRock(),\n      onSmoke:()=>this.onSmoke(), onShuffle:()=>this.onShuffle(),\n      onJunk:()=>this.onJunk(),\n      onUltimate:()=>this.onUltimate(),\n      onScroll:e=>this.onScroll(e),\n      onPickAgg:()=>this.onPickAgg(),onPickBuild:()=>this.onPickBuild(),onPickThief:()=>this.onPickThief(),\n      onStartBattle:()=>this.onStartBattle(),\n      onRestart:()=>this.onRestart(),\n      setScreen:this.setScreen,setScroll:this.setScroll,setPlayerBoard:this.setPlayerBoard,\n      setOppBoard:this.setOppBoard,setGhost:this.setGhost,setFx:this.setFx\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
