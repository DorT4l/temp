document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

oth;padding:30px 38px;border-radius:28px;background:linear-gradient(160deg,#fff,#fdeeff);box-shadow:0 20px 50px rgba(0,0,0,.4);display:flex;flex-direction:column;align-items:center;gap:8px\">\n            <div style=\"font-size:44px;font-weight:700;color:{{ overColor }};line-height:1\">{{ overTitle }}<\u002Fdiv>\n            <div style=\"font-size:14px;color:#6a5872;font-weight:500\">{{ overSub }}<\u002Fdiv>\n            <div onclick=\"{{ onRestart }}\" style=\"margin-top:10px;cursor:pointer;padding:12px 30px;border-radius:16px;background:linear-gradient(160deg,#7d5cff,#5a3fd6);color:#fff;font-weight:700;font-size:16px;box-shadow:0 6px 14px rgba(90,63,214,.4)\">Play again<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;$preview&quot;: {&quot;width&quot;: 402, &quot;height&quot;: 874},\n  &quot;theme&quot;: {&quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;bubblegum&quot;, &quot;tropical&quot;, &quot;galaxy&quot;], &quot;default&quot;: &quot;bubblegum&quot;, &quot;tsType&quot;: &quot;string&quot;},\n  &quot;opponentName&quot;: {&quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;PixelPanda&quot;, &quot;tsType&quot;: &quot;string&quot;},\n  &quot;startCoins&quot;: {&quot;editor&quot;: &quot;int&quot;, &quot;default&quot;: 120, &quot;min&quot;: 0, &quot;max&quot;: 999, &quot;tsType&quot;: &quot;number&quot;},\n  &quot;aiAggression&quot;: {&quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;chill&quot;, &quot;normal&quot;, &quot;relentless&quot;], &quot;default&quot;: &quot;normal&quot;, &quot;tsType&quot;: &quot;string&quot;},\n  &quot;juicy&quot;: {&quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;}\n}\">\nclass Component extends DCLogic {\n  constructor(props){\n    super(props);\n    this.COLORS=[null,\n      {b:'#ff6b9d',l:'#ffd0e2',d:'#d63b73'},\n      {b:'#ff9f45',l:'#ffe2bb',d:'#e2761a'},\n      {b:'#ffd23f',l:'#fff3c0',d:'#e0a800'},\n      {b:'#5fd06a',l:'#cef3d0',d:'#2f9e3c'},\n      {b:'#36d6c4',l:'#c4f4ee',d:'#149b8c'},\n      {b:'#5b9dff',l:'#cfe2ff',d:'#2b6fe0'},\n      {b:'#b47bff',l:'#e6d4ff',d:'#8047e0'},\n      {b:'#ff5c8a',l:'#ffd0dd',d:'#e0356a'},\n      {b:'#ffce54',l:'#fff0c0',d:'#e0a000'}\n    ];\n    this.THEMES={\n      bubblegum:{screenBg:'linear-gradient(165deg,#ffe6f4 0%,#ece3ff 48%,#e2f1ff 100%)',hudBg:'rgba(255,255,255,.78)',barBg:'rgba(255,255,255,.82)',playerFrame:'linear-gradient(160deg,#fff4fb,#f3e6ff)',oppFrame:'rgba(255,255,255,.55)',ink:'#3a2740',sub:'#7a6088'},\n      tropical:{screenBg:'linear-gradient(165deg,#d6fff0 0%,#fdf3d6 60%,#ffe9d2 100%)',hudBg:'rgba(255,255,255,.8)',barBg:'rgba(255,255,255,.84)',playerFrame:'linear-gradient(160deg,#fffaf0,#e7fff4)',oppFrame:'rgba(255,255,255,.5)',ink:'#234a3e',sub:'#5e7a5e'},\n      galaxy:{screenBg:'linear-gradient(165deg,#231846 0%,#1a1330 55%,#2a1b4d 100%)',hudBg:'rgba(255,255,255,.12)',barBg:'rgba(30,20,55,.55)',playerFrame:'rgba(255,255,255,.08)',oppFrame:'rgba(255,255,255,.05)',ink:'#f3ecff',sub:'#b9a6e0'}\n    };\n    this.CORES={\n      aggressor:{label:'AGGRESSOR',color:'#ff4d6d',g:'linear-gradient(150deg,#ff9a9a,#ff4d6d)'},\n      builder:{label:'BUILDER',color:'#2ea24c',g:'linear-gradient(150deg,#8fe6a0,#2ea24c)'},\n      thief:{label:'THIEF',color:'#8047e0',g:'linear-gradient(150deg,#c6a0ff,#8047e0)'}\n    };\n    this.TMETA={\n      bomb:{name:'BOMB',color:'#ff5a3c'},\n      ice:{name:'FREEZE',color:'#3a9fe0'},\n      rock:{name:'ROCK',color:'#6d6f7a'},\n      smoke:{name:'SMOKE',color:'#a86bd6'},\n      shuffle:{name:'SHUFFLE',color:'#c44bd0'}\n    };\n    this.CHARGE_MAX=100;\n    this.ULTS={\n      aggressor:{name:'OVERLOAD',icon:'💥',sub:'Bury them in a junk barrage',g:'linear-gradient(90deg,#ff5a3c,#ff2d6d)',emblem:'linear-gradient(150deg,#ff9a9a,#ff4d6d)',glow:'rgba(255,45,109,.6)'},\n      builder:{name:'EXCAVATE',icon:'⛏️',sub:'Dig out fog & smash all junk',g:'linear-gradient(90deg,#3fd06a,#1f9e8a)',emblem:'linear-gradient(150deg,#8fe6a0,#2ea24c)',glow:'rgba(45,162,76,.6)'},\n      thief:{name:'HEIST',icon:'🦝',sub:'Steal their best 3 candies',g:'linear-gradient(90deg,#b04bff,#7d2fd6)',emblem:'linear-gradient(150deg,#c6a0ff,#8047e0)',glow:'rgba(125,47,214,.6)'}\n    };\n    this.state={\n      screen:'loadout', core:null, selCore:'aggressor',\n      theme: props.theme || 'bubblegum',\n      coins: props.startCoins ?? 120,\n      player: this.seed(true),\n      opp: this.seed(false),\n      hoverIndex:-1, hoverValid:false,\n      frozen:false, bannerText:null, bannerColor:'#7d5cff',\n      gameOver:null, showHint:true,\n      combo:0, playerSmoke:0, oppSmoke:0, wildcardReady:false, charge:0\n    };\n    this.drag=null; this.timers=[]; this.lastMergeAt=0; this.oppAtkCount=0;\n  }\n\n  /* ---------- refs ---------- */\n  setScreen=el=>{this.screenEl=el};\n  setScroll=el=>{this.scrollEl=el};\n  setPlayerBoard=el=>{\n    this.pBoardEl=el;\n    // Bind drag via NATIVE pointer events (lowercase names) — survives the standalone\n    // bundler, which lowercases React's onPointerDown attrs and breaks synthetic handlers.\n    if(el && !el.__dragBound){\n      el.__dragBound=true;\n      el.addEventListener('pointerdown', e=>this.onBoardDown(e));\n      el.addEventListener('pointermove', e=>this.onBoardMove(e));\n      el.addEventListener('pointerup', e=>this.onBoardUp(e));\n      el.addEventListener('pointercancel', e=>this.onBoardUp(e));\n    }\n  };\n  setOppBoard=el=>{this.oBoardEl=el};\n  setGhost=el=>{this.ghostEl=el; if(el)el.style.display='none';};\n  setFx=el=>{this.fxEl=el};\n\n  /* ---------- helpers ---------- */\n  grad(l){const c=this.COLORS[l]||this.COLORS[1];return `radial-gradient(circle at 35% 28%, ${c.l}, ${c.b} 58%, ${c.d})`;}\n  rc(i){return [Math.floor(i/10), i%10];}\n  neigh8(i){const [r,c]=this.rc(i);const out=[];for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){if(!dr&&!dc)continue;const nr=r+dr,nc=c+dc;if(nr>=0&&nr<10&&nc>=0&&nc<10)out.push(nr*10+nc);}return out;}\n  comboWindow(){return 1500;}\n  aiInterval(){const a=this.props.aiAggression||'normal';return a==='chill'?9000:a==='relentless'?4500:6500;}\n\n  seed(isPlayer){\n    const cells=[];\n    for(let i=0;i<100;i++) cells.push({i,hidden:true,item:0,blocked:false,frostUntil:0});\n    const r0=3,r1=6,c0=3,c1=6;\n    for(let r=r0;r<=r1;r++)for(let c=c0;c<=c1;c++){const i=r*10+c;cells[i].hidden=false;cells[i].item=Math.random()<0.62?(Math.random()<0.65?1:2):0;}\n    const pairs=[[3*10+3,3*10+4],[5*10+5,5*10+6],[4*10+3,5*10+3],[3*10+6,4*10+6]];\n    pairs.forEach(([a,b])=>{cells[a].item=1;cells[b].item=1;cells[a].hidden=false;cells[b].hidden=false;});\n    cells[6*10+4].item=2;cells[6*10+4].hidden=false;cells[6*10+5].item=2;cells[6*10+5].hidden=false;\n    for(let i=0;i<100;i++){if(cells[i].hidden){const r=Math.random();cells[i].item=r<0.30?1:r<0.48?2:r<0.56?3:0;}}\n    if(!isPlayer){for(let r=2;r<=7;r++)for(let c=2;c<=7;c++){if(Math.random()<0.30){const i=r*10+c;cells[i].hidden=false;}}}\n    return cells;\n  }\n\n  pct(arr){let n=0;for(const c of arr)if(!c.hidden&&!c.blocked)n++;return n;}\n\n  snapToPlayer(){\n    const sc=this.scrollEl, pb=this.pBoardEl;\n    if(!sc||!pb)return;\n    const delta=pb.getBoundingClientRect().top - sc.getBoundingClientRect().top;\n    sc.scrollTop=Math.max(0, sc.scrollTop + delta - 92);\n    this.restScroll=sc.scrollTop;\n  }\n  // setInterval-based smooth scroll — native behavior:'smooth' is a no-op in this runtime\n  animScroll(targetTop, dur){\n    const sc=this.scrollEl; if(!sc)return;\n    dur=dur||520;\n    const start=sc.scrollTop, max=sc.scrollHeight-sc.clientHeight;\n    const dest=Math.max(0,Math.min(max,targetTop));\n    clearInterval(this._scrollIv);\n    if(Math.abs(dest-start)<2){sc.scrollTop=dest;return;}\n    const t0=Date.now();\n    const ease=p=>p<0.5?2*p*p:1-Math.pow(-2*p+2,2)/2;\n    this._scrollIv=setInterval(()=>{\n      const p=Math.min(1,(Date.now()-t0)/dur);\n      sc.scrollTop=start+(dest-start)*ease(p);\n      if(p>=1)clearInterval(this._scrollIv);\n    },16);\n    this.timers.push(this._scrollIv);\n  }\n  scrollToPlayer(smooth){\n    const sc=this.scrollEl,pb=this.pBoardEl;if(!sc||!pb)return;\n    const d=pb.getBoundingClientRect().top-sc.getBoundingClientRect().top;\n    const dest=Math.max(0,sc.scrollTop+d-92);\n    if(smooth)this.animScroll(dest); else sc.scrollTop=dest;\n  }\n  scrollToOpp(){ this.animScroll(0); }\n\n  /* ---------- lifecycle ---------- */\n  componentDidMount(){\n    requestAnimationFrame(()=>this.snapToPlayer());\n    this.applyViewport();\n    this._vp=()=>this.applyViewport();\n    window.addEventListener('resize',this._vp);\n    window.addEventListener('orientationchange',this._vp);\n  }\n  // On a phone: drop the desktop \"phone mockup\" bezel and let the game fill the whole\n  // viewport (no page scrolling — the in-game swipe-to-spy scroll still works).\n  applyViewport(){\n    const screen=this.screenEl; if(!screen)return;\n    const shell=screen.parentElement;          // bezel\n    const wrap=shell&&shell.parentElement;      // gray backdrop\n    const isMobile = window.matchMedia('(max-width: 640px)').matches\n      || (('ontouchstart' in window || navigator.maxTouchPoints>0) && Math.min(window.innerWidth,window.innerHeight) < 760);\n    if(isMobile){\n      const w=window.innerWidth, h=window.innerHeight;\n      if(wrap){wrap.style.padding='0';wrap.style.minHeight='0';wrap.style.background='none';wrap.style.width=w+'px';wrap.style.height=h+'px';}\n      if(shell){shell.style.width=w+'px';shell.style.height=h+'px';shell.style.padding='0';shell.style.borderRadius='0';shell.style.boxShadow='none';shell.style.background='none';}\n      screen.style.borderRadius='0';\n      document.documentElement.style.overflow='hidden';\n      document.body.style.overflow='hidden';\n      this._mobile=true;\n    } else if(this._mobile){\n      // restore desktop mockup if the window grows back to a large size\n      if(wrap){wrap.style.padding='';wrap.style.minHeight='';wrap.style.background='';wrap.style.width='';wrap.style.height='';}\n      if(shell){shell.style.width='';shell.style.height='';shell.style.padding='';shell.style.borderRadius='';shell.style.boxShadow='';shell.style.background='';}\n      screen.style.borderRadius='';\n      document.documentElement.style.overflow='';\n      document.body.style.overflow='';\n      this._mobile=false;\n    }\n    this.snapToPlayer();\n  }\n  componentDidUpdate(prev){\n    if(prev.theme!==this.props.theme && this.props.theme && this.props.theme!==this.state.theme){\n      this.setState({theme:this.props.theme});\n    }\n  }\n  componentWillUnmount(){\n    this.timers.forEach(clearTimeout); clearInterval(this.oppTimer); clearInterval(this.oppAtkTimer);\n    if(this._vp){window.removeEventListener('resize',this._vp);window.removeEventListener('orientationchange',this._vp);}\n  }\n\n  startBattle(){\n    this.setState({screen:'battle', core:this.state.selCore, showHint:true},()=>{\n      requestAnimationFrame(()=>this.snapToPlayer());\n      this.timers.push(setTimeout(()=>this.snapToPlayer(),160));\n      this.timers.push(setTimeout(()=>this.snapToPlayer(),440));\n      clearInterval(this.oppTimer); clearInterval(this.oppAtkTimer);\n      this.oppTimer=setInterval(()=>this.oppTick(),3400);\n      this.oppAtkTimer=setInterval(()=>this.oppAttack(), this.aiInterval());\n      this.timers.push(this.oppTimer); this.timers.push(this.oppAtkTimer);\n      if(this.state.core==='builder'){this.armWildcard(8000);}\n      this.banner(this.CORES[this.state.core].label+' READY', this.CORES[this.state.core].color);\n      this.timers.push(setTimeout(()=>this.incoming('smoke'),6500));\n    });\n  }\n  armWildcard(delay){\n    clearTimeout(this._wildT);\n    this._wildT=setTimeout(()=>{this.setState({wildcardReady:true});}, delay||20000);\n    th i].blocked&&opp[i].item===0);\n    for(let k=0;k<2&&empties.length;k++){const j=Math.floor(Math.random()*empties.length);opp[empties[j]].item=1;empties.splice(j,1);}\n    this.setState({opp});\n    if(this.pct(opp)>=100)this.timers.push(setTimeout(()=>this.setState({gameOver:'lose'}),300));\n  }\n  oppAttack(){\n    if(this.state.frozen||this.state.gameOver||this.state.screen!=='battle')return;\n    this.oppAtkCount++;\n    if(this.oppAtkCount%3===0){ this.sendCinematic(this.randSabotage(),'in'); }\n    else { this.junkDrop('player', 1+Math.floor(Math.random()*2)); }\n  }\n\n  /* ---------- actions ---------- */\n  onGenerate(){\n    if(this.state.screen!=='battle'||this.state.frozen||this.state.gameOver)return;\n    if(this.state.coins<20){this.denyCoins();return;}\n    const player=this.state.player.map(c=>({...c}));\n    const empty=player.map((c,i)=>i).filter(i=>!player[i].hidden&&player[i].item===0&&!player[i].blocked&&player[i].frostUntil<=Date.now());\n    if(!empty.length){this.banner('No empty space!','#c0392b');return;}\n    const drops=[];\n    for(let k=0;k<3&&empty.length;k++){const j=Math.floor(Math.random()*empty.length);const idx=empty[j];player[idx].item=1;drops.push(idx);empty.splice(j,1);}\n    this.setState({player,coins:this.state.coins-20,showHint:false});\n    drops.forEach(idx=>{this.requestPop(idx);const c=this.centerOf(this.pBoardEl,'data-i',idx);this.timers.push(setTimeout(()=>this.burst(c,'#54cf6f',6),30));});\n  }\n  attackManual(type,cost){\n    if(this.state.screen!=='battle'||this.state.frozen||this.state.gameOver)return;\n    if(this.state.coins<cost){this.denyCoins();return;}\n    this.setState({coins:this.state.coins-cost});\n    this.sendCinematic(type,'out');\n  }\n  incoming(type){this.sendCinematic(type,'in');}\n  onBomb(){this.attackManual('bomb',50);}\n  onIce(){this.attackManual('ice',35);}\n  onRock(){this.attackManual('rock',25);}\n  onSmoke(){this.attackManual('smoke',40);}\n  onShuffle(){this.attackManual('shuffle',30);}\n  onJunk(){\n    const COST=30;\n    if(this.state.screen!=='battle'||this.state.frozen||this.state.gameOver)return;\n    if(this.state.coins<COST){this.denyCoins();return;}\n    this.setState({coins:this.state.coins-COST,showHint:false});\n    // sweep over to the rival's board to watch the junk land, then return\n    this.scrollToOpp();\n    this.timers.push(setTimeout(()=>this.junkDrop('opp',3),480));\n    this.timers.push(setTimeout(()=>this.scrollToPlayer(true),1700));\n  }\n  onScroll(e){if(this.state.showHint&&this.restScroll!=null&&e.target.scrollTop<this.restScroll-26)this.setState({showHint:false});}\n\n  onThemeBubble(){this.setState({theme:'bubblegum'});}\n  onThemeTropical(){this.setState({theme:'tropical'});}\n  onThemeGalaxy(){this.setState({theme:'galaxy'});}\n\n  onPickAgg(){this.setState({selCore:'aggressor'});}\n  onPickBuild(){this.setState({selCore:'builder'});}\n  onPickThief(){this.setState({selCore:'thief'});}\n  onStartBattle(){this.startBattle();}\n\n  onRestart(){\n    this.timers.forEach(clearTimeout);this.timers=[];clearInterval(this.oppTimer);clearInterval(this.oppAtkTimer);\n    this.lastMergeAt=0;this.oppAtkCount=0;\n    this.setState({screen:'loadout',core:null,player:this.seed(true),opp:this.seed(false),coins:this.props.startCoins??120,gameOver:null,frozen:false,bannerText:null,showHint:true,combo:0,playerSmoke:0,oppSmoke:0,wildcardReady:false,charge:0},()=>{\n      requestAnimationFrame(()=>this.snapToPlayer());\n    });\n  }\n\n  /* ---------- view ---------- */\n  buildView(arr,interactive){\n    const dragFrom=this.drag?this.drag.fromI:-1;\n    const hover=this.state.hoverIndex, hv=this.state.hoverValid;\n    const now=Date.now();\n    return arr.map(c=>{\n      const candy=!c.hidden&&c.item>0&&!c.blocked;\n      let outline='none',tf='none',opacity='1';\n      if(candy&&interactive){\n        if(c.i===dragFrom){opacity='0.3';tf='scale(.88)';}\n        else if(c.i===hover&&hv){outline='3px solid #fff';tf='scale(1.14)';}\n      }\n      return {i:c.i,stone:c.hidden,candy,blocked:c.blocked&&!c.hidden,frost:c.frostUntil>now,level:c.item,grad:candy?this.grad(c.item):'',outline,opacity,tf};\n    });\n  }\n  selStyle(key){\n    const sel=this.state.selCore===key;\n    const col=this.CORES[key].color;\n    return {\n      border: sel? '3px solid '+col : '3px solid rgba(0,0,0,0)',\n      shadow: sel? '0 10px 26px rgba(0,0,0,.32)' : '0 4px 12px rgba(0,0,0,.16)',\n      scale: sel? 'scale(1.025)' : 'scale(1)'\n    };\n  }\n\n  renderVals(){\n    const t=this.THEMES[this.state.theme]||this.THEMES.bubblegum;\n    const over=this.state.gameOver;\n    const combo=this.state.combo;\n    const {m,underdog}=this.junkMul(combo);\n    const core=this.state.core;\n    const ultM=core?this.ULTS[core]:null;\n    const ultReady=this.state.charge>=this.CHARGE_MAX;\n    const chargePct=Math.round(this.state.charge/this.CHARGE_MAX*100);\n    const ag=this.selStyle('aggressor'), bu=this.selStyle('builder'), th=this.selStyle('thief');\n    const pp=this.pct(this.state.player), op=this.pct(this.state.opp);\n    return {\n      screenBg:t.screenBg, hudBg:t.hudBg, barBg:t.barBg,\n      playerFrame:t.playerFrame, oppFrame:t.oppFrame,\n      inkColor:t.ink, subInk:t.sub,\n      coins:this.state.coins,\n      opponentName:this.props.opponentName||'PixelPanda',\n      playerPct:pp, oppPct:op, playerPctW:pp+'%', oppPctW:op+'%',\n      playerView:this.buildView(this.state.player,true),\n      oppView:this.buildView(this.state.opp,false),\n      frozen:this.state.frozen,\n      bannerText:this.state.bannerText, bannerColor:this.state.bannerColor,\n      showHint:this.state.showHint&&this.state.screen==='battle',\n      playerSmoke:this.state.playerSmoke>Date.now(),\n      oppSmoke:this.state.oppSmoke>Date.now(),\n      comboShow:combo>=2&&this.state.screen==='battle',\n      comboMul:combo, comboLabel:underdog?'UNDERDOG':'COMBO',\n      comboColor:underdog?'linear-gradient(135deg,#b04bff,#7d2fd6)':'linear-gradient(135deg,#ff8a3c,#ff5a8a)',\n      coreBadge:!!core&&this.state.screen==='battle',\n      coreLabel:core?this.CORES[core].label:'', coreColor:core?this.CORES[core].color:'#7d5cff', coreG:core?this.CORES[core].g:'',\n      wildShow:this.state.core==='builder'&&this.state.wildcardReady&&this.state.screen==='battle',\n      showUlt:!!core&&this.state.screen==='battle',\n      ultName:ultM?ultM.name:'', ultIcon:ultM?ultM.icon:'',\n      ultSub:ultM?(ultReady?'Charged — tap to unleash!':ultM.sub):'',\n      ultStatus:ultReady?'TAP!':chargePct+'%',\n      ultFillW:(ultReady?100:chargePct)+'%',\n      ultFill:ultM?ultM.g:'#888',\n      ultEmblem:ultM?ultM.emblem:'',\n      ultShadow:ultReady?('0 0 20px 3px '+(ultM?ultM.glow:'rgba(255,255,255,.5)')):'0 4px 12px rgba(20,12,40,.22)',\n      ultAnim:ultReady?'ultReady 1.4s ease-in-out infinite':'none',\n      showLoadout:this.state.screen==='loadout',\n      aggBorder:ag.border, aggShadow:ag.shadow, aggScale:ag.scale,\n      buildBorder:bu.border, buildShadow:bu.shadow, buildScale:bu.scale,\n      thiefBorder:th.border, thiefShadow:th.shadow, thiefScale:th.scale,\n      gameOver:over,\n      overTitle:over==='win'?'YOU WIN!':'YOU LOSE',\n      overSub:over==='win'?'Board fully revealed 🎉':'Rival revealed first',\n      overColor:over==='win'?'#23b14f':'#e23b5a',\n      onBoardDown:e=>this.onBoardDown(e),\n      onBoardMove:e=>this.onBoardMove(e),\n      onBoardUp:e=>this.onBoardUp(e),\n      onGenerate:()=>this.onGenerate(),\n      onBomb:()=>this.onBomb(), onIce:()=>this.onIce(), onRock:()=>this.onRock(),\n      onSmoke:()=>this.onSmoke(), onShuffle:()=>this.onShuffle(),\n      onJunk:()=>this.onJunk(),\n      onUltimate:()=>this.onUltimate(),\n      onScroll:e=>this.onScroll(e),\n      onThemeBubble:()=>this.onThemeBubble(),onThemeTropical:()=>this.onThemeTropical(),onThemeGalaxy:()=>this.onThemeGalaxy(),\n      onPickAgg:()=>this.onPickAgg(),onPickBuild:()=>this.onPickBuild(),onPickThief:()=>this.onPickThief(),\n      onStartBattle:()=>this.onStartBattle(),\n      onRestart:()=>this.onRestart(),\n      setScreen:this.setScreen,setScroll:this.setScroll,setPlayerBoard:this.setPlayerBoard,\n      setOppBoard:this.setOppBoard,setGhost:this.setGhost,setFx:this.setFx\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
